<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/bookingform.css" />
    <title>Document</title>
  </head>
  <body>
    <section class="booking-form-all">
      <div class="booking-form">
        <div class="booking-car-details">
          <div class="booking-car-info">
            <div class="car-info">
              <p>Litco</p>
              <p>RAB 234 2 B</p>
            </div>
            <div class="car-info">
              <p>FROM:</p>
              <p>kigali</p>
              <p>TO:</p>
              <p>Musanze</p>
            </div>
          </div>
          <form action="#" method="post">
            <fieldset>
              <label for="name">Name:</label>
              <input type="text" name="P_name" id="" placeholder="Names" />
            </fieldset>
            <fieldset>
              <label for="phone">Phone:</label>
              <input
                type="tel"
                name="phone"
                id=""
                minlength="10"
                maxlength="10"
                pattern="^(079|078|072|073)[0-9]{7}$"
                title="Please enter a 10-digit phone number starting with 079, 078, 072, or 073."
                placeholder="07********"
              />
            </fieldset>
            <fieldset>
              <label for="email">Email:</label>
              <input
                type="email"
                name="email"
                id=""
                placeholder="Example@***.***"
              />
            </fieldset>
            <fieldset class="car">
              <label for="car">cars</label>
              <input type="text" />
            </fieldset>
            <fieldset>
              <button type="submit">Buy A Ticket</button>
            </fieldset>
          </form>
        </div>
      </div>
    </section>

    <script src="../js/scroll.js"></script>
  </body>
</html>
